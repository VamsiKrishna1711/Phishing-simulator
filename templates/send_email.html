<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Email</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000;
    padding: 40px 20px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    max-width: 520px;
    width: 100%;
    text-align: center;
}

h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 40px;
    color: #fff;
}

form {
    background: #0a0a0a;
    padding: 40px;
    border: 1px solid #1a1a1a;
}

label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: #999;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 24px;
    background: #000;
    border: 1px solid #1a1a1a;
    color: #fff;
    font-size: 15px;
    transition: all 0.2s;
}

input:focus {
    outline: none;
    border-color: #333;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
}

button {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #000;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
}

.back {
    display: block;
    margin-top: 24px;
    color: #666;
    text-decoration: none;
    font-size: 14px;
}

.back:hover {
    color: #999;
}
</style>
</head>
<body>
<div class="container">
<h1>Send Phishing Email</h1>
<form method="POST">
<label>Target Email Address</label>
<input type="email" name="email" placeholder="user@company.com" required>
<button type="submit">Send Email</button>
</form>
<a href="/" class="back">← Back to Dashboard</a>
</div>
</body>
</html>
