<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    padding: 48px;
    text-align: center;
}

h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 36px;
    color: #fff;
}

.error {
    padding: 14px;
    background: #1a0000;
    border: 1px solid #330000;
    color: #ff6666;
    margin-bottom: 24px;
    font-size: 14px;
}

label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: #999;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 24px;
    background: #000;
    border: 1px solid #1a1a1a;
    color: #fff;
    font-size: 15px;
    transition: all 0.2s;
}

input:focus {
    outline: none;
    border-color: #333;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
}

button {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #000;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
}

.footer {
    margin-top: 24px;
}

.footer a {
    color: #666;
    text-decoration: none;
    font-size: 14px;
}

.footer a:hover {
    color: #999;
}
</style>
</head>
<body>
<div class="container">
<h1>Admin Login</h1>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST">
<label>Password</label>
<input type="password" name="password" required autofocus>
<button type="submit">Login</button>
</form>
<div class="footer">
<a href="/">← Back to Home</a>
</div>
</div>
</body>
</html>
